<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- VER: 14:15 PHYSICS -->
    <title>Flyback 動態功耗計算機</title>
    <meta name="description" content="具備動態公式推導功能的互動式 Flyback 功耗計算機">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <!-- KaTeX for formula rendering -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>
    <style>
        :root {
            /* Fixed Overall Dark Style */
            --bg-base: #0a0a0a;
            --bg-surface: #171717;
            --bg-input: #262626;
            --border-subtle: #333333;
            --border-focus: #3b82f6;
            --text-primary: #f5f5f5;
            --text-secondary: #a3a3a3;
            --accent-primary: #3b82f6;
            --accent-success: #10b981;
            --accent-warning: #f59e0b;
            --card-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            --panel-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.3), 0 10px 10px -5px rgba(0, 0, 0, 0.2);
            --bg-panel: linear-gradient(180deg, var(--bg-surface) 0%, rgba(23, 23, 23, 0.8) 100%);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            transition: all 0.2s ease-in-out;
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background-color: var(--bg-base);
            color: var(--text-primary);
            line-height: 1.6;
            padding: 2rem 1rem;
            position: relative;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            position: relative;
        }

        .zoom-controls {
            position: absolute;
            top: 0;
            right: 0;
            display: flex;
            gap: 0.5rem;
            z-index: 10;
        }

        .zoom-controls button {
            background-color: var(--bg-input);
            color: var(--text-primary);
            border: 1px solid var(--border-subtle);
            padding: 0.4rem 0.8rem;
            border-radius: 0.5rem;
            cursor: pointer;
            font-weight: 600;
        }

        header {
            text-align: center;
            margin-bottom: 3rem;
            padding-top: 2rem;
        }

        header h1 {
            font-size: 2.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, #60a5fa, #3b82f6);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.5rem;
        }

        header p {
            color: var(--text-secondary);
            font-size: 1.1rem;
        }

        .dashboard {
            display: grid;
            grid-template-columns: 1fr 350px;
            gap: 2rem;
            align-items: start;
        }

        @media (max-width: 900px) {
            .dashboard {
                grid-template-columns: 1fr;
            }
        }

        .card {
            background-color: var(--bg-surface);
            border: 1px solid var(--border-subtle);
            border-radius: 1rem;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
            box-shadow: var(--card-shadow);
        }

        .card h2 {
            font-size: 1.25rem;
            margin-bottom: 1.25rem;
            border-bottom: 1px solid var(--border-subtle);
            padding-bottom: 0.5rem;
            color: var(--text-primary);
            display: flex;
            justify-content: space-between;
        }

        .input-group {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.75rem;
            padding: 0.5rem;
            border-radius: 0.5rem;
        }

        .input-group:hover {
            background-color: rgba(255, 255, 255, 0.02);
        }

        .input-label {
            color: var(--text-secondary);
            font-size: 0.95rem;
            flex: 1;
        }

        .input-wrapper {
            display: flex;
            align-items: center;
            width: 140px;
            background-color: var(--bg-input);
            border: 1px solid var(--border-subtle);
            border-radius: 0.375rem;
            padding-right: 0.75rem;
        }

        .input-wrapper:focus-within {
            border-color: var(--border-focus);
            box-shadow: 0 0 0 1px var(--border-focus);
        }

        .input-wrapper input {
            flex: 1;
            min-width: 0;
            width: 100%;
            background-color: transparent;
            border: none;
            color: var(--text-primary);
            padding: 0.5rem 0.5rem 0.5rem 0.75rem;
            font-family: inherit;
            font-size: 0.95rem;
            text-align: right;
            outline: none;
        }

        .input-wrapper::after {
            content: attr(data-unit);
            color: var(--text-secondary);
            font-size: 0.85rem;
            pointer-events: none;
            white-space: nowrap;
        }

        .results-panel {
            position: sticky;
            top: 2rem;
            background: var(--bg-panel);
            border: 1px solid var(--border-subtle);
            border-radius: 1rem;
            padding: 2rem;
            box-shadow: var(--panel-shadow);
        }

        .result-item {
            margin-bottom: 1.5rem;
            padding-bottom: 1.5rem;
            border-bottom: 1px solid var(--border-subtle);
        }

        .result-label {
            font-size: 0.85rem;
            color: var(--text-secondary);
            margin-bottom: 0.75rem;
            display: block;
        }

        .result-value {
            font-size: 2.25rem;
            font-weight: 800;
            color: var(--text-primary);
            display: flex;
            align-items: baseline;
            gap: 0.5rem;
        }

        .value-pill {
            background: #1a1a1a;
            border: 1px solid #333;
            padding: 0.2rem 1.25rem;
            border-radius: 0.75rem;
            display: inline-flex;
            align-items: baseline;
            gap: 0.75rem;
        }

        .text-blue {
            color: #3b82f6 !important;
        }

        .result-value .unit {
            font-size: 1rem;
            font-weight: 500;
            color: var(--text-secondary);
        }

        #val-efficiency {
            color: var(--accent-success);
            font-size: 2.5rem;
        }

        #val-total-ploss {
            color: var(--accent-warning);
        }

        .advanced-btn {
            background: var(--bg-input);
            border: 1px solid var(--border-subtle);
            color: var(--accent-primary);
            padding: 0.2rem 0.5rem;
            border-radius: 0.3rem;
            font-size: 0.7rem;
            cursor: pointer;
            margin-left: 0.5rem;
            font-weight: 600;
        }

        .advanced-panel {
            background: #1e293b;
            color: #f1f5f9;
            border-radius: 0.8rem;
            padding: 1.5rem;
            margin: 0.8rem 0 2rem 0;
            display: none;
            flex-direction: column;
            gap: 1.25rem;
            border-left: 4px solid var(--accent-primary);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.2);
        }

        .advanced-panel.show {
            display: flex;
        }

        .formula-box {
            background: #ffffff;
            color: #000000 !important;
            border: 1px solid #e2e8f0;
            padding: 1rem;
            margin: 0.8rem 0;
            border-radius: 0.5rem;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            font-size: 0.85rem;
            overflow-x: auto;
            white-space: nowrap;
        }

        .formula-box * {
            color: #000000 !important;
        }

        /* Summary Panel Formulas (Dark Mode Optimization) */
        .formula-transparent {
            background: transparent !important;
            border: none !important;
            box-shadow: none !important;
            padding: 0 !important;
            margin-top: 0.5rem !important;
            margin-bottom: 0.5rem !important;
            overflow: visible !important;
            height: auto !important;
            min-height: 1.5rem;
            font-size: 0.8rem;
            width: 100%;
        }

        .formula-transparent .katex {
            color: #d1d5db !important; /* Light gray for dark background */
        }

        /* 移除所有數位輸入框的上下箭頭 (Spinner) */
        input::-webkit-outer-spin-button,
        input::-webkit-inner-spin-button {
            -webkit-appearance: none;
            appearance: none;
            margin: 0;
        }
        input[type=number] {
            -moz-appearance: textfield;
            appearance: textfield;
        }

        .t1-breakdown {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0.5rem;
            margin-top: 1rem;
            padding-top: 0.8rem;
            border-top: 1px dashed var(--border-subtle);
            font-size: 0.8rem;
            color: var(--text-secondary);
        }

        .schematic-container {
            width: 100%;
            grid-column: 1 / -1;
            max-width: 1200px;
            margin: 0 auto 2.5rem auto;
            border: 1px solid var(--border-subtle);
            border-radius: 12px;
            background: #1a1a1a;
            position: relative;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        .schematic-img {
            width: 100%;
            height: auto;
            display: block;
            opacity: 0.85;
        }

        .schematic-label-input {
            position: absolute;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid transparent;
            color: #fff;
            text-shadow: 0 0 4px #000, 0 0 8px var(--accent-primary);
            font-family: 'Inter', sans-serif;
            font-size: 0.85rem;
            font-weight: 700;
            text-align: center;
            padding: 2px 4px;
            border-radius: 4px;
            width: 100px;
            transition: all 0.2s;
            z-index: 10;
        }

        .turns-ratio-container {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .ratio-separator {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--accent-primary);
        }

        /* 模式選擇下拉選單樣式優化 */
        #operation_mode {
            width: 100%;
            background-color: var(--bg-input) !important;
            border: 1px solid var(--border-subtle) !important;
            color: var(--text-primary) !important;
            padding: 0.5rem 0.75rem !important;
            border-radius: 0.375rem !important;
            outline: none !important;
            cursor: pointer;
            font-family: inherit;
            font-size: 0.95rem;
            appearance: none;
            -webkit-appearance: none;
            -moz-appearance: none;
            background-image: url('data:image/svg+xml;charset=US-ASCII,<svg%20xmlns%3D"http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg"%20width%3D"292.4"%20height%3D"292.4"><path%20fill%3D"%23a3a3a3"%20d%3D"M287%2069.4a17.6%2017.6%200%200%200-13-5.4H18.4c-5%200-9.3%201.8-12.9%205.4A17.6%2017.6%200%200%200%200%2082.2c0%205%201.8%209.3%205.4%2012.9l128%20127.9c3.6%203.6%207.8%205.4%2012.8%205.4s9.2-1.8%2012.8-5.4L287%2095.1c3.6-3.6%205.4-7.8%205.4-12.8%200-5-1.8-9.2-5.4-12.9z"%2F><%2Fsvg>');
            background-repeat: no-repeat;
            background-position: right 0.7rem top 50%;
            background-size: 0.65rem auto;
            padding-right: 2rem !important;
        }

        #operation_mode:focus {
            border-color: var(--border-focus) !important;
            box-shadow: 0 0 0 1px var(--border-focus) !important;
        }

        #operation_mode option {
            background-color: #2d2d2d;
            color: #ffffff;
            padding: 10px;
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>
    <div class="container">
        <div class="zoom-controls">
            <button onclick="changeZoom(-0.1)">放大 (-)</button>
            <button onclick="changeZoom(0.1)">縮小 (+)</button>
            <button onclick="changeZoom(0)">重設比例</button>
        </div>

        <header>
            <h1>Flyback 動態功耗計算機</h1>
            <p>互動式損耗評估與效率估算工具 (Flyback Topology)</p>
        </header>

        <!-- Project Management UI -->
        <div class="project-controls" style="display: flex; gap: 0.5rem; margin-bottom: 1.5rem; justify-content: flex-end; align-items: center;">
            <span style="color: var(--text-secondary); font-size: 0.95rem; font-weight: 600; margin-right: auto;">專案管理 (Project Management)</span>
            <button onclick="exportJSON()" class="advanced-btn" style="padding: 0.4rem 0.8rem; font-size: 0.85rem; margin-left: 0;">匯出專案 (Export JSON)</button>
            <button onclick="document.getElementById('import-file').click()" class="advanced-btn" style="padding: 0.4rem 0.8rem; font-size: 0.85rem; margin-left: 0;">載入專案 (Import JSON)</button>
            <input type="file" id="import-file" accept=".json" style="display: none;" onchange="importJSON(event)">
            <button onclick="clearLocalData()" class="advanced-btn" style="padding: 0.4rem 0.8rem; font-size: 0.85rem; color: #ef4444; border-color: #ef4444; margin-left: 0;">清除暫存 (Clear Local Data)</button>
        </div>

        <div class="dashboard">
            <div class="inputs-panel">
                <!-- System Specifications -->
                <div class="card">
                    <h2 style="color:var(--accent-success)">系統規格 (System Specifications)</h2>
                    <div class="input-group">
                        <label class="input-label" for="operation_mode">運作模式 (Operation Mode)</label>
                        <div class="input-wrapper" style="width: 180px; padding: 0; background: transparent; border: none;">
                            <select id="operation_mode" onchange="calculatePower();">
                                <option value="CRM" selected>CRM (臨界導通模式)</option>
                                <option value="DCM">DCM (不連續導通模式)</option>
                                <option value="CCM">CCM (連續導通模式)</option>
                                <option value="QR">QR (準諧振模式)</option>
                            </select>
                        </div>
                    </div>
                    <div id="mode-warning" style="color: #ff4d4d; background: rgba(255, 77, 77, 0.1); border: 1px solid rgba(255, 77, 77, 0.2); padding: 0.5rem; border-radius: 4px; text-align: center; margin-bottom: 1rem; display: none; font-weight: bold; font-size: 0.85rem;"></div>
                    <div id="f-mode-display" class="formula-transparent" style="text-align: center; margin-bottom: 1rem;"></div>

                    <div class="input-group">
                        <label class="input-label" for="sys-vacmin">最小交流輸入電壓 V<sub>AC_min</sub> (Vrms)</label>
                        <div class="input-wrapper" data-unit="V">
                            <input type="number" id="sys-vacmin" value="90" oninput="calculatePower();">
                        </div>
                    </div>
                    <div class="input-group">
                        <label class="input-label" for="sys-vacmax">最大交流輸入電壓 V<sub>AC_max</sub> (Vrms)</label>
                        <div class="input-wrapper" data-unit="V">
                            <input type="number" id="sys-vacmax" value="264" oninput="calculatePower();">
                        </div>
                    </div>
                    <div class="input-group">
                        <label class="input-label" for="sys-vout">輸出電壓 V<sub>out</sub></label>
                        <div class="input-wrapper" data-unit="V">
                            <input type="number" id="sys-vout" value="12" oninput="calculatePower();">
                        </div>
                    </div>
                    <div class="input-group">
                        <label class="input-label" for="sys-iout">額定負載 I<sub>out</sub></label>
                        <div class="input-wrapper" data-unit="A">
                            <input type="number" id="sys-iout" value="5" oninput="calculatePower();">
                        </div>
                    </div>
                    <div class="input-group">
                        <label class="input-label" for="sys-fsw">工作頻率 f<sub>sw</sub></label>
                        <div class="input-wrapper" data-unit="kHz">
                            <input type="number" id="sys-fsw" value="65" oninput="calculatePower();">
                        </div>
                    </div>
                    <div class="input-group">
                        <label class="input-label" for="sys-eta-est">估計效率 η<sub>target</sub></label>
                        <div class="input-wrapper" data-unit="%">
                            <input type="number" id="sys-eta-est" value="85" oninput="calculatePower();">
                        </div>
                    </div>
                    <div class="input-group">
                        <label class="input-label" for="sys-fline">輸入電源頻率 f<sub>line_min</sub></label>
                        <div class="input-wrapper" data-unit="Hz">
                            <input type="number" id="sys-fline" value="47" oninput="calculatePower();">
                        </div>
                    </div>
                </div>

                <!-- Flyback Core Parameters -->
                <div class="card">
                    <h2 style="color:var(--accent-primary)">Flyback 核心參數 (Core Parameters)</h2>
                    <div class="input-group">
                        <label class="input-label" for="fb-np">變壓器匝數比 (N<sub>p</sub> : N<sub>s</sub>)</label>
                        <div class="turns-ratio-container">
                            <div class="input-wrapper" data-unit="T">
                                <input type="number" id="fb-np" value="24" oninput="calculatePower();">
                            </div>
                            <span class="ratio-separator">:</span>
                            <div class="input-wrapper" data-unit="T">
                                <input type="number" id="fb-ns" value="4" oninput="calculatePower();">
                            </div>
                        </div>
                    </div>
                    <div class="input-group">
                        <label class="input-label" for="fb-lm">激磁電感 L<sub>m</sub></label>
                        <div class="input-wrapper" data-unit="µH">
                            <input type="number" id="fb-lm" value="230" oninput="calculatePower();">
                        </div>
                    </div>
                    
                    <div id="f-fb-duty" class="formula-box"></div>
                    <div id="f-fb-rms" class="formula-box"></div>
                </div>

                <div id="sections-container"></div>
            </div>

            <!-- Results Panel -->
            <div class="results-panel">
                <div class="result-item">
                    <span class="result-label">輸出功率 (OUTPUT POWER)</span>
                    <div class="value-pill">
                        <span id="val-pout" class="text-blue">60.0</span>
                        <span class="unit">W</span>
                    </div>
                </div>
                <div class="result-item">
                    <span class="result-label">總功耗 (TOTAL POWER LOSS)</span>
                    <div class="result-value">
                        <span id="val-total-ploss">0.000</span>
                        <span class="unit">W</span>
                    </div>
                </div>
                <div class="result-item">
                    <span class="result-label">輸入功率 (INPUT POWER)</span>
                    <div class="result-value">
                        <span id="val-pin">0.000</span>
                        <span class="unit">W</span>
                    </div>
                    <div id="summary-pin-formula-box" class="formula-transparent"></div>
                </div>
                <div class="result-item" style="border-bottom: none;">
                    <span class="result-label">效率 (EFFICIENCY)</span>
                    <div class="result-value">
                        <span id="val-efficiency">0.000</span>
                        <span class="unit">%</span>
                    </div>
                    <div id="summary-eff-formula-box" class="formula-transparent"></div>
                </div>
                <div class="chart-container" style="margin-top: 20px; background: rgba(0,0,0,0.2); border-radius: 12px; padding: 10px; height: 600px; min-height: 600px;">
                    <canvas id="lossChart"></canvas>
                </div>
            </div>
        </div>
    </div>

    <script>
        let lossChartInstance = null;

        const componentNames = {
            'bridge': 'Bridge Rectifier',
            'fb-mos': 'PWM MOSFET (Main Switch)',
            'fb-rcd': 'RCD Snubber',
            'fb-transformer': 'Flyback Transformer (T1)',
            'fb-sec-rect': '二次側同步整流 (SR MOSFET)',
            'fb-blocking': 'Blocking MOSFET (VBUS 開關)',
            'fb-lf1': 'Input CM Choke (LF1)',
            'fb-bulk-cap': 'Input Bulk Capacitor',
            'fb-lf51-cout': 'Output Filter Components',
            'fb-other': 'Other Losses'
        };

        const powerDesign = {
            sections: [
                {
                    id: 'primary',
                    title: '一次側功率級 (Primary Stage)',
                    components: [
                        { id: 'fb-bulk-cap', label: '輸入大電容 (Bulk Cap)', value: 0.05, isAdvanced: true },
                        { id: 'fb-lf1', label: '輸入共模電感 (Input CM Choke)', value: 0.132, isAdvanced: true },
                        { id: 'fb-mos', label: 'PWM MOSFET (主開關)', value: 0.85, isAdvanced: true },
                        { id: 'fb-rcd', label: 'RCD 吸收損耗', value: 1.10, isAdvanced: true },
                        { id: 'bridge', label: '橋式整流器', value: 0.69, isAdvanced: true }
                    ]
                },
                {
                    id: 'transformer',
                    title: '磁性元件損耗 (Magnetics)',
                    components: [
                        { id: 'fb-transformer', label: '變壓器 T1 總損', value: 1.95, isAdvanced: true }
                    ]
                },
                {
                    id: 'secondary',
                    title: '二次側級 (Secondary)',
                    components: [
                        { id: 'fb-sec-rect', label: '二次側同步整流 (SR MOSFET)', value: 1.65, isAdvanced: true },
                        { id: 'fb-blocking', label: 'Blocking MOSFET (VBUS開關)', value: 0.16, isAdvanced: true },
                        { id: 'fb-lf51-cout', label: '輸出濾波元件 (Output Choke & Cap)', value: 0.12, isAdvanced: true }
                    ]
                },
                {
                    id: 'other',
                    title: '其他綜合損耗 (Other Losses)',
                    components: [
                        { id: 'fb-other', label: 'Other Losses', value: 0.50 }
                    ]
                }
            ]
        };

        function renderUI() {
            const container = document.getElementById('sections-container');
            container.innerHTML = '';
            
            // Schematic Placeholder
            if (!document.getElementById('schematic-interaction-container')) {
                const schematicContainer = document.createElement('div');
                schematicContainer.id = 'schematic-interaction-container';
                schematicContainer.className = 'schematic-container';
                document.querySelector('.dashboard').parentNode.insertBefore(schematicContainer, document.querySelector('.dashboard'));
                schematicContainer.innerHTML = `
                    <img src="schematic_01.png" class="schematic-img" alt="Topology Skeleton">
                    <div style="position:absolute; bottom:10px; right:15px; font-size:12px; color:var(--text-secondary); background:rgba(0,0,0,0.5); padding:2px 8px; border-radius:10px;">
                        Infrastructure Skeleton (Flyback Logic Active)
                    </div>
                `;
            }

            powerDesign.sections.forEach(section => {
                const card = document.createElement('div');
                card.className = 'card';
                let html = `<h2>${section.title} <span id="sum-${section.id}">0.000 W</span></h2>`;
                
                section.components.forEach(comp => {
                    html += `
                        <div class="input-group">
                            <label class="input-label">

                                <div class="input-group"><label class="input-label">單位體積鐵損 P<sub>cv</sub></label><div class="input-wrapper" data-unit="kW/m³"><input type="number" id="xfmr-pcv" value="300" step="1" oninput="calculatePower();"></div></div>
                                
                                <div id="f-xfmr-copper" class="formula-box"></div>

                        } else if (comp.id === 'fb-sec-rect') {
                            html += `
                                <div class="input-group"><label class="input-label">導通電阻 R<sub>ds_on_SR</sub></label><div class="input-wrapper" data-unit="Ω"><input type="number" id="sr-rdson" value="0.010" step="0.001" oninput="calculatePower();"></div></div>
                                <div class="input-group"><label class="input-label">本體二極體壓降 V<sub>f_SR</sub></label><div class="input-wrapper" data-unit="V"><input type="number" id="sr-vf" value="1.2" oninput="calculatePower();"></div></div>
                                <div class="input-group"><label class="input-label">導通延遲時間 t<sub>on_delay_SR</sub></label><div class="input-wrapper" data-unit="ns"><input type="number" id="sr-tdelay" value="20" oninput="calculatePower();"></div></div>
                                <div id="f-sr-conduction" class="formula-box"></div>

                        } else if (comp.id === 'fb-lf1') {
                            html += `

                                    <div class="input-wrapper" style="width: 140px; padding: 0; background: transparent; border: none;">
                                        <select id="lf-quantity" onchange="toggleLF2(); calculatePower();" style="width: 100%; background-color: var(--bg-input); border: 1px solid var(--border-subtle); color: var(--text-primary); padding: 0.5rem 0.75rem; border-radius: 0.375rem; outline: none; cursor: pointer; font-family: inherit; font-size: 0.95rem; appearance: none; -webkit-appearance: none; -moz-appearance: none; background-image: url('data:image/svg+xml;charset=US-ASCII,<svg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%22292.4%22%20height%3D%22292.4%22><path%20fill%3D%22%23a3a3a3%22%20d%3D%22M287%2069.4a17.6%2017.6%200%200%200-13-5.4H18.4c-5%200-9.3%201.8-12.9%205.4A17.6%2017.6%200%200%200%200%2082.2c0%205%201.8%209.3%205.4%2012.9l128%20127.9c3.6%203.6%207.8%205.4%2012.8%205.4s9.2-1.8%2012.8-5.4L287%2095.1c3.6-3.6%205.4-7.8%205.4-12.8%200-5-1.8-9.2-5.4-12.9z%22%2F><%2Fsvg>'); background-repeat: no-repeat; background-position: right 0.7rem top 50%; background-size: 0.65rem auto;">
                                            <option value="1" selected>1 顆 (LF1)</option>
                                            <option value="2">2 顆 (LF1 + LF2)</option>

                                <div class="input-group" id="lf2-container" style="display: none;"><label class="input-label">第二級直流阻抗 DCR<sub>LF2</sub></label><div class="input-wrapper" data-unit="Ω"><input type="number" id="dcr-lf2" value="0.100" step="0.001" oninput="calculatePower();"></div></div>
                                <div id="f-lf1" class="formula-box" style="border: 1px solid var(--accent-primary);"></div>

                        } else if (comp.id === 'fb-lf51-cout') {
                            html += `
                                <div class="input-group"><label class="input-label">電感直流阻抗 DCR<sub>LF51</sub></label><div class="input-wrapper" data-unit="Ω"><input type="number" id="dcr-lf51" value="0.008" step="0.001" oninput="calculatePower();"></div></div>
                                <div class="input-group"><label class="input-label">電容等效串聯電阻 ESR<sub>Outcap</sub></label><div class="input-wrapper" data-unit="Ω"><input type="number" id="esr-outcap" value="0.02" step="0.001" oninput="calculatePower();"></div></div>
                                <div id="f-lf51-cout" class="formula-box" style="border: 1px solid var(--accent-primary);"></div>
                            `;
                        } else if (comp.id === 'fb-bulk-cap') {
                            html += `
                                <div class="input-group"><label class="input-label">目標谷底電壓 V<sub>Bulk_min</sub></label><div class="input-wrapper" data-unit="V"><input type="number" id="fb-vbulkmin" value="70" step="1" oninput="calculatePower();"></div></div>
                                <div class="input-group"><label class="input-label">功率因數 PF</label><div class="input-wrapper" data-unit=""><input type="number" id="bridge-pf" value="0.58" step="0.01" oninput="calculatePower();"></div></div>
                                <div class="input-group"><label class="input-label">大電容等效電阻 ESR<sub>Bulk</sub></label><div class="input-wrapper" data-unit="Ω"><input type="number" id="esr-bulk" value="2.05" step="0.001" oninput="calculatePower();"></div></div>
                                <div id="f-bulk-cap" class="formula-box" style="border: 1px solid var(--accent-primary);"></div>

                card.innerHTML = html;
                container.appendChild(card);
            });
        }

        function toggleAdvanced(e, id) {
            e.preventDefault();
            const panel = document.getElementById(id + '-advanced-panel');
            if (panel) panel.classList.toggle('show');
        }

        function toggleLF2() {
            const qty = document.getElementById('lf-quantity')?.value;
            const container = document.getElementById('lf2-container');
            if (container) {
                container.style.display = (qty === '2') ? 'flex' : 'none';
            }
        }

        function renderFormula(id, latex) {
            const el = document.getElementById(id);
            if (el && typeof katex !== 'undefined') {
                try { katex.render(latex, el, { throwOnError: false, displayMode: false }); } catch(err) { console.error(err); }
            }
        }

        function parseNum(id, defaultValue) {
            const el = document.getElementById(id);
            if (!el) return defaultValue;
            const val = parseFloat(el.value);
            return isNaN(val) ? defaultValue : val;
        }

        function calculatePower() {
            try {
                // 1. Inputs - System Specs
            const v_ac = parseNum('sys-vacmin', 90);
            const v_out = parseNum('sys-vout', 12);
            const i_out = parseNum('sys-iout', 5);
            const fsw_input = document.getElementById('sys-fsw');
            let f_sw_k = Math.max(1, parseNum('sys-fsw', 65));
            const η_target = Math.max(0.1, parseNum('sys-eta-est', 85) / 100);
            let f_sw = f_sw_k * 1000;

            const v_bulk_min = parseNum('fb-vbulkmin', 70);
            const np_val = Math.max(1, parseNum('fb-np', 24));
            const ns_val = Math.max(1, parseNum('fb-ns', 4));
            const n_ratio = np_val / ns_val;
            const lm_uH = Math.max(1, parseNum('fb-lm', 230));
            const lm = lm_uH * 1e-6;

            const v_in_rms_min = Math.max(1, parseNum('bridge-vin-min', 90));
            const pf = Math.max(0.1, parseNum('bridge-pf', 0.58));
            const f_line_min = Math.max(1, parseNum('sys-fline', 47));
            const esr_bulk = parseNum('esr-bulk', 2.05);

            const r_ds_on_sw = parseNum('mos-rdson-sw', 0.21);
            const c_oss_eff = parseNum('mos-coss', 180);
            const lk_uH = parseNum('snub-lk', 4.5);
            const dcr_tp = parseNum('xfmr-dcrp', 0.3);
            const dcr_ts = parseNum('xfmr-dcrs', 0.0082);
            const ve_mm3 = parseNum('xfmr-ve', 4258.3);
            const p_cv = parseNum('xfmr-pcv', 300);
            const r_ds_on_sr = parseNum('sr-rdson', 0.01);
            const v_f_sr = parseNum('sr-vf', 1.2);
            const t_on_delay_sr = parseNum('sr-tdelay', 20);
            const r_ds_on_blocking = parseNum('blocking-rdson', 0.016);
            const dcr_lf51 = parseNum('dcr-lf51', 0.008);
            const esr_outcap = parseNum('esr-outcap', 0.02);
            const dcr_lf1 = parseNum('dcr-lf1', 0.132);
            const lf_quantity = parseInt(document.getElementById('lf-quantity')?.value || '1');
            const dcr_lf2 = parseNum('dcr-lf2', 0.100);
            const p_other = parseNum('fb-other', 0.5);
            const v_ac_max = parseNum('sys-vacmax', 264);

            // --- Global Warning Reset ---
            const warningDiv = document.getElementById('mode-warning');
            warningDiv.style.display = 'none';
            warningDiv.innerText = '';

            const p_out = v_out * i_out;
            document.getElementById('val-pout').innerText = p_out.toFixed(1);

            // --- 0. Input Power & Rectifier Sizing ---
            let v_f_bridge_field = document.getElementById('bridge-vf');
            let v_f_bridge_val = parseFloat(v_f_bridge_field?.value);
            
            // Safety check for anomalous Vf (e.g. 100V)
            if (v_f_bridge_val > 10) {
                console.warn("Detected anomalous Vf_Bridge:", v_f_bridge_val, "Resetting to 0.69V");
                v_f_bridge_val = 0.69;
                if (v_f_bridge_field) v_f_bridge_field.value = 0.69;
            } else if (isNaN(v_f_bridge_val)) {
                v_f_bridge_val = 0.69;
            }
            
            const p_in_target = p_out / η_target;
            const i_in_rms_max = p_in_target / (pf * v_in_rms_min);
            const i_in_avg_max = (2 / Math.PI) * (Math.sqrt(2) * i_in_rms_max);
            const p_bridge = 0.5 * i_in_avg_max * (2 * v_f_bridge_val);
            document.getElementById('bridge').value = p_bridge.toFixed(3);

            const n_bridge = Math.max(1, parseNum('bridge-n', 1));
            const p_bridge_per_unit = p_bridge / n_bridge;

            let bridge_latex = `
                \\begin{aligned} 
                &\\small P_{in\\_target} = \\frac{P_{out}}{\\eta_{target}} = \\frac{${p_out.toFixed(1)}}{${η_target.toFixed(2)}} = ${p_in_target.toFixed(3)} \\text{ W} \\\\
                &\\small I_{in\\_rms\\_max} = \\frac{P_{in\\_target}}{PF \\cdot V_{in\\_rms\\_min}} = \\frac{${p_in_target.toFixed(1)}}{${pf.toFixed(2)} \\cdot ${v_in_rms_min.toFixed(0)}} = ${i_in_rms_max.toFixed(3)} \\text{ A} \\\\
                &\\small I_{in\\_avg\\_max} = \\left(\\frac{2}{\\pi}\\right) (\\sqrt{2} \\cdot I_{in\\_rms\\_max}) = 0.637 \\cdot (1.414 \\cdot ${i_in_rms_max.toFixed(3)}) = ${i_in_avg_max.toFixed(3)} \\text{ A} \\\\
                &\\small P_{Bridge\\_total} = \\frac{1}{2} \\cdot I_{in\\_avg\\_max} \\cdot (2 V_{f\\_Bridge}) = 0.5 \\cdot ${i_in_avg_max.toFixed(3)} \\cdot (2 \\cdot ${v_f_bridge_val.toFixed(2)}) = ${p_bridge.toFixed(3)} \\text{ W} 
            `;
            
            if (n_bridge > 1) {
                bridge_latex += `\\\\ &\\small P_{per\\_Bridge} = \\frac{P_{Bridge\\_total}}{N_{Bridge}} = \\frac{${p_bridge.toFixed(3)}}{${n_bridge}} = ${p_bridge_per_unit.toFixed(3)} \\text{ W/ea}`;
            }
            bridge_latex += `\\end{aligned}`;
            renderFormula('f-bridge', bridge_latex);

            // Bulk Capacitor Loss
            const v_in_dc_min = v_ac * Math.SQRT2;
            const t_d = (1 / (4 * f_line_min)) + (1 / (2 * Math.PI * f_line_min)) * Math.asin(Math.min(1.0, v_bulk_min / v_in_dc_min));
            const c_bulk_req = (2 * p_in_target * t_d) / Math.max(1, (Math.pow(v_in_dc_min, 2) - Math.pow(v_bulk_min, 2))) * 1e6;
            const i_bulk_avg = p_in_target / (0.5 * (v_in_dc_min + v_bulk_min));
            const pf_factor = Math.max(0, (1 / (2 * Math.pow(pf, 2))) - 0.5); 
            const i_bulk_rms = i_bulk_avg * Math.sqrt(pf_factor);
            const p_bulk_loss = Math.pow(i_bulk_rms, 2) * esr_bulk;
            
            document.getElementById('fb-bulk-cap').value = p_bulk_loss.toFixed(3);
            renderFormula('f-bulk-cap', `
                \\begin{aligned}
                &\\small t_d = \\frac{1}{4 f_{line}} + \\frac{\\arcsin(\\frac{V_{Bulk\\_min}}{V_{in\\_dc\\_min}})}{2 \\pi f_{line}} = ${(t_d * 1000).toFixed(2)} \\text{ ms} \\\\
                &\\small C_{Bulk\\_req} = \\frac{2 P_{in\\_target} t_d}{V_{in\\_dc\\_min}^2 - V_{Bulk\\_min}^2} = ${c_bulk_req.toFixed(1)} \\text{ }\\mu\\text{F} \\\\
                &\\small I_{in\\_rms\\_max} = \\frac{P_{in\\_target}}{PF \\cdot V_{in\\_rms\\_min}} = ${i_in_rms_max.toFixed(3)} \\text{ A} \\\\
                &\\small I_{Bulk\\_avg} = \\frac{P_{in\\_target}}{0.5 \\cdot (V_{in\\_dc\\_min} + V_{Bulk\\_min})} = ${i_bulk_avg.toFixed(3)} \\text{ A} \\\\
                &\\small I_{Bulk\\_rms} \\approx I_{Bulk\\_avg} \\sqrt{\\frac{1}{2PF^2} - \\frac{1}{2}} = ${i_bulk_rms.toFixed(3)} \\text{ A} \\\\
                &\\small P_{Bulk\\_loss} = I_{Bulk\\_rms}^2 \\cdot ESR_{Bulk} = ${p_bulk_loss.toFixed(3)} \\text{ W}
                \\end{aligned}
            `);

            // Input CM Choke Loss
            const p_lf1_loss = Math.pow(i_in_rms_max, 2) * dcr_lf1;
            let p_lf_total = p_lf1_loss;
            let lf_latex = '';

            if (lf_quantity === 2) {
                const p_lf2_loss = Math.pow(i_in_rms_max, 2) * dcr_lf2;
                p_lf_total += p_lf2_loss;
                lf_latex = `
                    \\begin{aligned}
                    &\\small P_{LF1\\_loss} = I_{in\\_rms\\_max}^2 \\cdot DCR_{LF1} = ${p_lf1_loss.toFixed(3)} \\text{ W} \\\\
                    &\\small P_{LF2\\_loss} = I_{in\\_rms\\_max}^2 \\cdot DCR_{LF2} = ${i_in_rms_max.toFixed(3)}^2 \\cdot ${dcr_lf2.toFixed(3)} = ${p_lf2_loss.toFixed(3)} \\text{ W} \\\\
                    &\\small P_{LF\\_total} = P_{LF1\\_loss} + P_{LF2\\_loss} = ${p_lf_total.toFixed(3)} \\text{ W}
                    \\end{aligned}
                `;
            } else {
                lf_latex = `
                    \\begin{aligned}
                    &\\small P_{LF1\\_loss} = I_{in\\_rms\\_max}^2 \\cdot DCR_{LF1} = ${i_in_rms_max.toFixed(3)}^2 \\cdot ${dcr_lf1.toFixed(3)} = ${p_lf1_loss.toFixed(3)} \\text{ W}
                    \\end{aligned}
                `;
            }
            
            document.getElementById('fb-lf1').value = p_lf_total.toFixed(3);
            renderFormula('f-lf1', lf_latex);

            const v_dc = v_ac * Math.sqrt(2) * 0.9; 
            const p_in_est = p_out / η_target;
            const v_ro = n_ratio * v_out; 
            
            // --- Core Engine Branching (CRM/DCM/CCM/QR) ---
            const opMode = document.getElementById('operation_mode').value;
            renderFormula('f-mode-display', `\\text{Current Mode: } \\mathbf{${opMode}}`);

            // Frequency Input UI Reset
            fsw_input.readOnly = false;
            fsw_input.style.color = 'inherit';
            fsw_input.style.backgroundColor = 'transparent';

            let d_max, i_p_pk, i_s_pk, ip_rms, is_rms;

            switch(opMode) {
                case 'CRM':
                    d_max = (n_ratio * v_out) / (v_bulk_min + n_ratio * v_out);
                    
                    // CRM 物理極限檢查：所需功率是否超過該頻率下的搬運上限
                    const p_in_req = p_out / η_target;
                    const p_in_limit = (Math.pow(v_bulk_min, 2) * Math.pow(d_max, 2)) / (2 * lm * f_sw);
                    
                    if (p_in_req > p_in_limit) {
                        warningDiv.innerText = '警告：當前參數在設定頻率下無法維持 CRM，已進入 CCM 範圍';
                        warningDiv.style.display = 'block';
                    }

                    i_p_pk = (v_bulk_min * d_max) / (lm * f_sw);
                    i_s_pk = n_ratio * i_p_pk;
                    ip_rms = Math.sqrt(d_max / 3) * i_p_pk;
                    is_rms = Math.sqrt((1 - d_max) / 3) * i_s_pk;
                    renderFormula('f-fb-duty', `\\begin{aligned} &\\small D_{max} = \\frac{n \\cdot V_{out}}{V_{Bulk\\_min} + n \\cdot V_{out}} = \\frac{${n_ratio.toFixed(2)} \\cdot ${v_out.toFixed(1)}}{${v_bulk_min.toFixed(0)} + ${n_ratio.toFixed(2)} \\cdot ${v_out.toFixed(1)}} = ${d_max.toFixed(3)} \\end{aligned}`);
                    renderFormula('f-fb-rms', `
                        \\begin{aligned}
                        &\\small I_{p\\_rms} = \\sqrt{\\frac{D_{max}}{3}} \\cdot \\frac{V_{Bulk\\_min} \\cdot D_{max}}{L_m \\cdot f_{sw}} = \\sqrt{\\frac{${d_max.toFixed(3)}}{3}} \\cdot \\frac{${v_bulk_min.toFixed(0)} \\cdot ${d_max.toFixed(3)}}{${lm_uH}\\mu \\cdot ${f_sw_k.toFixed(2)}k} = ${ip_rms.toFixed(2)} \\text{ A} \\\\
                        &\\small I_{s\\_rms} = \\sqrt{\\frac{1-D_{max}}{3}} \\cdot (n \\cdot I_{p\\_pk}) = \\sqrt{\\frac{${(1-d_max).toFixed(3)}}{3}} \\cdot ${i_s_pk.toFixed(2)} = ${is_rms.toFixed(2)} \\text{ A}
                        \\end{aligned}
                    `);
                    break;
                
                case 'DCM':
                    // DCM 模式：頻率固定，佔空比隨負載變動
                    const p_in_dcm = p_out / η_target;
                    d_max = Math.sqrt((2 * lm * f_sw * p_in_dcm) / Math.pow(v_bulk_min, 2));
                    const d2 = (v_bulk_min * d_max) / (n_ratio * v_out);
                    
                    if (d_max + d2 > 1.0) {
                        warningDiv.innerText = '警告：當前參數已進入 CCM 範圍，請調高頻率或感量 (D+D2 > 1)';
                        warningDiv.style.display = 'block';
                    }
                    
                    renderFormula('f-fb-duty', `
                        \\begin{aligned}
                        &\\small D = \\sqrt{\\frac{2 \\cdot L_m \\cdot f_{sw} \\cdot P_{in}}{V_{Bulk\\_min}^2}} = \\sqrt{\\frac{2 \\cdot ${lm_uH}\\mu \\cdot ${f_sw_k.toFixed(2)}k \\cdot ${p_in_dcm.toFixed(1)}}{${v_bulk_min.toFixed(0)}^2}} = ${d_max.toFixed(3)} \\\\
                        &\\small D_2 = \\frac{V_{Bulk\\_min} \\cdot D}{n \\cdot V_{out}} = \\frac{${v_bulk_min.toFixed(0)} \\cdot ${d_max.toFixed(3)}}{${n_ratio.toFixed(2)} \\cdot ${v_out.toFixed(1)}} = ${d2.toFixed(3)}
                        \\end{aligned}
                    `);
                    
                    i_p_pk = (v_bulk_min * d_max) / (lm * f_sw);
                    i_s_pk = n_ratio * i_p_pk;
                    ip_rms = i_p_pk * Math.sqrt(d_max / 3);
                    is_rms = (n_ratio * i_p_pk) * Math.sqrt(d2 / 3);

                    renderFormula('f-fb-rms', `
                        \\begin{aligned}
                        &\\small I_{p\\_rms} = I_{p\\_pk} \\cdot \\sqrt{\\frac{D}{3}} = ${i_p_pk.toFixed(2)} \\cdot \\sqrt{\\frac{${d_max.toFixed(3)}}{3}} = ${ip_rms.toFixed(2)} \\text{ A} \\\\
                        &\\small I_{s\\_rms} = I_{s\\_pk} \\cdot \\sqrt{\\frac{D_{2}}{3}} = ${i_s_pk.toFixed(2)} \\cdot \\sqrt{\\frac{${d2.toFixed(3)}}{3}} = ${is_rms.toFixed(2)} \\text{ A}
                        \\end{aligned}
                    `);
                    break;

                case 'CCM':
                    // CCM 模式：固定佔空比，波形為梯形波
                    d_max = (n_ratio * v_out) / (v_bulk_min + n_ratio * v_out);
                    const p_in_ccm = p_out / η_target;
                    const i_in_avg = p_in_ccm / v_bulk_min;
                    const delta_i = (v_bulk_min * d_max) / (lm * f_sw);
                    
                    i_p_pk = (i_in_avg / d_max) + (delta_i / 2);
                    const i_p_valley = i_p_pk - delta_i;

                    if (i_p_valley <= 0) {
                        warningDiv.innerText = '警告：目前參數下無法維持 CCM，請調高感量 Lm 或頻率 fsw';
                        warningDiv.style.display = 'block';
                    }
                    
                    renderFormula('f-fb-duty', `
                        \\begin{aligned}
                        &\\small D = \\frac{n \\cdot V_{out}}{V_{Bulk\\_min} + n \\cdot V_{out}} = \\frac{${n_ratio.toFixed(2)} \\cdot ${v_out.toFixed(1)}}{${v_bulk_min.toFixed(0)} + ${n_ratio.toFixed(2)} \\cdot ${v_out.toFixed(1)}} = ${d_max.toFixed(3)} \\\\
                        &\\small \\Delta I = \\frac{V_{Bulk\\_min} \\cdot D}{L_m \\cdot f_{sw}} = \\frac{${v_bulk_min.toFixed(0)} \\cdot ${d_max.toFixed(3)}}{${lm_uH}\\mu \\cdot ${f_sw_k.toFixed(2)}k} = ${delta_i.toFixed(2)} \\text{ A} \\\\
                        &\\small I_{p\\_valley} = I_{p\\_pk} - \\Delta I = ${i_p_pk.toFixed(2)} - ${delta_i.toFixed(2)} = ${i_p_valley.toFixed(2)} \\text{ A}
                        \\end{aligned}
                    `);

                    ip_rms = Math.sqrt(d_max * (Math.pow(i_p_pk, 2) + i_p_pk * i_p_valley + Math.pow(i_p_valley, 2)) / 3);
                    
                    const i_s_pk_ccm = n_ratio * i_p_pk;
                    const i_s_valley_ccm = n_ratio * i_p_valley;
                    is_rms = Math.sqrt((1 - d_max) * (Math.pow(i_s_pk_ccm, 2) + i_s_pk_ccm * i_s_valley_ccm + Math.pow(i_s_valley_ccm, 2)) / 3);
                    
                    renderFormula('f-fb-rms', `
                        \\begin{aligned}
                        &\\small I_{p\\_rms} = \\sqrt{\\frac{D}{3} (I_{pk}^2 + I_{pk} I_{valley} + I_{valley}^2)} = \\sqrt{\\frac{${d_max.toFixed(3)}}{3} (${i_p_pk.toFixed(2)}^2 + ${i_p_pk.toFixed(2)} \\cdot ${i_p_valley.toFixed(2)} + ${i_p_valley.toFixed(2)}^2)} = ${ip_rms.toFixed(2)} \\text{ A} \\\\
                        &\\small I_{s\\_rms} = \\sqrt{\\frac{1-D}{3} (I_{s\\_pk}^2 + I_{s\\_pk} I_{s\\_valley} + I_{s\\_valley}^2)} = \\sqrt{\\frac{${(1-d_max).toFixed(3)}}{3} (${i_s_pk_ccm.toFixed(2)}^2 + ${i_s_pk_ccm.toFixed(2)} \\cdot ${i_s_valley_ccm.toFixed(2)} + ${i_s_valley_ccm.toFixed(2)}^2)} = ${is_rms.toFixed(2)} \\text{ A}
                        \\end{aligned}
                    `);

                    // Update i_s_pk for subsequent use
                    i_s_pk = i_s_pk_ccm; 
                    break;

                case 'QR':
                    // QR 模式：頻率隨負載與諧振時間變動
                    const p_in_qr = p_out / η_target;
                    const c_oss_pf = parseNum('mos-coss', 180);
                    const c_oss = c_oss_pf * 1e-12;
                    const t_res = Math.PI * Math.sqrt(lm * c_oss); // 諧振半週期
                    
                    // 解二次方程求 Ipk: 0.5 * Lm * Ipk^2 - Pin * Lm * (1/Vin + 1/Vro) * Ipk - Pin * Tres = 0
                    const a_coeff = 0.5 * lm;
                    const b_coeff = -p_in_qr * lm * (1/v_bulk_min + 1/v_ro);
                    const c_coeff = -p_in_qr * t_res;
                    
                    i_p_pk = (-b_coeff + Math.sqrt(Math.pow(b_coeff, 2) - 4 * a_coeff * c_coeff)) / (2 * a_coeff);
                    
                    const t_on = (lm * i_p_pk) / v_bulk_min;
                    const t_off = (lm * i_p_pk) / v_ro;
                    
                    f_sw = 1 / (t_on + t_off + t_res);
                    f_sw_k = f_sw / 1000;
                    
                    fsw_input.value = f_sw_k.toFixed(1);
                    fsw_input.readOnly = true;
                    fsw_input.style.color = '#888';
                    fsw_input.style.backgroundColor = 'rgba(255,255,255,0.05)';

                    d_max = t_on * f_sw;
                    const d2_qr = t_off * f_sw;
                    
                    renderFormula('f-fb-duty', `
                        \\begin{aligned}
                        &\\small t_{res} = \\pi \\cdot \\sqrt{L_m \\cdot C_{oss}} = \\pi \\cdot \\sqrt{${lm_uH}\\mu \\cdot ${c_oss_pf}p} = ${(t_res*1e6).toFixed(2)} \\mu s \\\\
                        &\\small f_{sw} = \\frac{1}{t_{on} + t_{off} + t_{res}} = \\frac{1}{${(t_on*1e6).toFixed(2)}\\mu + ${(t_off*1e6).toFixed(2)}\\mu + ${(t_res*1e6).toFixed(2)}\\mu} = ${f_sw_k.toFixed(2)} \\text{ kHz}
                        \\end{aligned}
                    `);
                    
                    i_s_pk = n_ratio * i_p_pk;
                    ip_rms = i_p_pk * Math.sqrt(d_max / 3);
                    is_rms = i_s_pk * Math.sqrt(d2_qr / 3);

                    renderFormula('f-fb-rms', `
                        \\begin{aligned}
                        &\\small I_{p\\_rms} = I_{p\\_pk} \\sqrt{\\frac{D}{3}} = ${i_p_pk.toFixed(2)} \\sqrt{\\frac{${d_max.toFixed(3)}}{3}} = ${ip_rms.toFixed(2)} \\text{ A} \\\\
                        &\\small I_{s\\_rms} = I_{s\\_pk} \\sqrt{\\frac{D_2}{3}} = ${i_s_pk.toFixed(2)} \\sqrt{\\frac{${d2_qr.toFixed(3)}}{3}} = ${is_rms.toFixed(2)} \\text{ A}
                        \\end{aligned}
                    `);
                    break;
            }

            // Formula Cards for Current Engine (通用顯示，DCM/CCM 特殊公式在 case 中已處理)
            if (opMode === 'CRM') {
                renderFormula('f-fb-rms', `
                    \\begin{aligned}
                    I_{p\\_rms} &= \\sqrt{\\frac{D_{max}}{3}} \\cdot \\left(\\frac{V_{Bulk\\_min} \\cdot D_{max}}{L_m \\cdot f_{sw}}\\right) = ${ip_rms.toFixed(2)} \\text{ A} \\\\
                    I_{s\\_rms} &= \\sqrt{\\frac{1-D_{max}}{3}} \\cdot (n \\cdot I_{p\\_pk}) = ${is_rms.toFixed(2)} \\text{ A}
                    \\end{aligned}
                `);
            }
            const duty = d_max;
            
            // Inductance / Peak Current (Engine values take priority)
            const lp = lm;
            const i_pk = i_p_pk;
            const i_rms_pri = ip_rms;
            const i_rms_sec = is_rms;

            // --- 0. Pre-calculation Stage (Partial Losses first to avoid circular dependency) ---
            const v_f_bridge = parseNum('bridge-vf', 0.69);

            // 1. PWM MOSFET (Main Switch) - p_pwm

            let v_sw_final;
            const isValleySwitching = (opMode === 'QR' || opMode === 'CRM');
            
            if (isValleySwitching) {
                v_sw_final = Math.max(0, v_bulk_min - v_ro);
            } else {
                v_sw_final = v_bulk_min + v_ro;
            }

            const p_pwm_cond = Math.pow(ip_rms, 2) * r_ds_on_sw;
            const p_pwm_sw = 0.5 * (c_oss_eff * 1e-12) * Math.pow(v_sw_final, 2) * f_sw;
            const p_pwm = p_pwm_cond + p_pwm_sw;
            document.getElementById('fb-mos').value = p_pwm.toFixed(3);

            renderFormula('f-mos-conduction', `\\begin{aligned} &\\small P_{SW\\_cond} = I_{p\\_rms}^2 \\cdot R_{ds\\_on\\_SW} = ${ip_rms.toFixed(2)}^2 \\cdot ${r_ds_on_sw.toFixed(3)} = ${p_pwm_cond.toFixed(3)} \\text{ W} \\end{aligned}`);
            
            if (isValleySwitching) {
                renderFormula('f-mos-valley-sw', `
                    \\begin{aligned}
                    &\\small V_{ro} = n \\cdot V_{out} = ${n_ratio.toFixed(2)} \\cdot ${v_out.toFixed(1)} = ${v_ro.toFixed(2)} \\text{ V} \\\\
                    &\\small V_{SW\\_ds\\_valley} = \\max(0, V_{Bulk\\_min} - V_{ro}) = \\max(0, ${v_bulk_min.toFixed(0)} - ${v_ro.toFixed(2)}) = ${v_sw_final.toFixed(2)} \\text{ V} \\\\
                    &\\small P_{SW\\_switch\\_loss} = \\frac{1}{2} C_{oss\\_eff} \\cdot V_{SW\\_ds\\_valley}^2 \\cdot f_{sw} = 0.5 \\cdot ${c_oss_eff}p \\cdot ${v_sw_final.toFixed(2)}^2 \\cdot ${f_sw_k.toFixed(2)}k = ${p_pwm_sw.toFixed(3)} \\text{ W}
                    \\end{aligned}
                `);
            } else {
                renderFormula('f-mos-valley-sw', `
                    \\begin{aligned}
                    &\\small V_{ro} = n \\cdot V_{out} = ${n_ratio.toFixed(2)} \\cdot ${v_out.toFixed(1)} = ${v_ro.toFixed(2)} \\text{ V} \\\\
                    &\\small V_{stress} = V_{Bulk\\_min} + V_{ro} = ${v_bulk_min.toFixed(0)} + ${v_ro.toFixed(2)} = ${v_sw_final.toFixed(2)} \\text{ V} \\\\
                    &\\small P_{SW\\_switch\\_loss} = \\frac{1}{2} C_{oss\\_eff} \\cdot V_{stress}^2 \\cdot f_{sw} = 0.5 \\cdot ${c_oss_eff}p \\cdot ${v_sw_final.toFixed(2)}^2 \\cdot ${f_sw_k.toFixed(2)}k = ${p_pwm_sw.toFixed(3)} \\text{ W}
                    \\end{aligned}
                `);
            }
            renderFormula('f-mos-total', `\\begin{aligned} &\\small P_{SW\\_loss} = P_{SW\\_cond} + P_{SW\\_sw\\_loss} = ${p_pwm_cond.toFixed(3)} + ${p_pwm_sw.toFixed(3)} = ${p_pwm.toFixed(3)} \\text{ W} \\end{aligned}`);

            // 2. RCD Snubber - p_rcd
            const lk = lk_uH / 1e6;
            const rcdEnabled = document.getElementById('rcd-enable')?.checked;
            let p_rcd = 0;
            if (rcdEnabled) {
                p_rcd = 0.5 * lk * Math.pow(i_p_pk, 2) * f_sw;
                document.getElementById('fb-rcd').value = p_rcd.toFixed(3);
                renderFormula('f-snub', `\\begin{aligned} &\\small P_{rcd} = 0.5 L_k I_{pk}^2 f_{sw} = 0.5 \\cdot ${lk_uH.toFixed(1)}\\mu \\cdot ${i_p_pk.toFixed(2)}^2 \\cdot ${f_sw_k.toFixed(2)}\\text{k} = ${p_rcd.toFixed(3)} \\text{ W} \\end{aligned}`);
            } else {
                document.getElementById('fb-rcd').value = "0.000";
                renderFormula('f-snub', `\\text{RCD Snubber: } \\mathbf{\\text{已停用 (Disabled)}}`);
            }

            // 3. Magnetics (T1) - p_mag

            const p_t_core_loss = p_cv * 1000 * (ve_mm3 * 1e-9);
            const p_t_prim_loss = Math.pow(ip_rms, 2) * dcr_tp;
            const p_t_sec_loss = Math.pow(is_rms, 2) * dcr_ts;
            const p_t_wire_loss = p_t_prim_loss + p_t_sec_loss;
            const p_mag = p_t_wire_loss + p_t_core_loss;
            document.getElementById('fb-transformer').value = p_mag.toFixed(3);

            renderFormula('f-xfmr-copper', `\\begin{aligned} &\\small P_{T\\_pri\\_loss} = I_{p\\_rms}^2 \\cdot DCR_{T\\_pri} = ${ip_rms.toFixed(2)}^2 \\cdot ${dcr_tp.toFixed(3)} = ${p_t_prim_loss.toFixed(3)} \\text{ W} \\\\ &\\small P_{T\\_sec\\_loss} = I_{s\\_rms}^2 \\cdot DCR_{T\\_sec} = ${is_rms.toFixed(2)}^2 \\cdot ${dcr_ts.toFixed(4)} = ${p_t_sec_loss.toFixed(3)} \\text{ W} \\end{aligned}`);
            renderFormula('f-xfmr-core', `\\begin{aligned} &\\small P_{T\\_core\\_loss} = P_{cv} \\cdot V_e = ${p_cv.toFixed(0)} \\cdot 10^3 \\cdot ${ve_mm3.toFixed(1)} \\cdot 10^{-9} = ${p_t_core_loss.toFixed(3)} \\text{ W} \\end{aligned}`);
            renderFormula('f-xfmr-total', `\\begin{aligned} &\\small P_{T\\_loss} = P_{T\\_wire} + P_{T\\_core} = ${p_t_wire_loss.toFixed(3)} + ${p_t_core_loss.toFixed(3)} = ${p_mag.toFixed(3)} \\text{ W} \\end{aligned}`);

            // 4. SR MOSFET - p_sr

            const p_sr_cond = Math.pow(is_rms, 2) * r_ds_on_sr;
            const p_sr_dead = v_f_sr * i_s_pk * (t_on_delay_sr * 1e-9) * f_sw;
            const p_sr = p_sr_cond + p_sr_dead;
            document.getElementById('fb-sec-rect').value = p_sr.toFixed(3);

            renderFormula('f-sr-conduction', `\\begin{aligned} &\\small P_{SR\\_cond} = I_{s\\_rms}^2 \\cdot R_{ds\\_on\\_SR} = ${is_rms.toFixed(2)}^2 \\cdot ${r_ds_on_sr.toFixed(3)} = ${p_sr_cond.toFixed(3)} \\text{ W} \\end{aligned}`);
            renderFormula('f-sr-switch', `\\begin{aligned} &\\small P_{dead} = V_{f\\_SR} \\cdot I_{s\\_pk} \\cdot t_{delay} \\cdot f_{sw} = ${v_f_sr.toFixed(2)} \\cdot ${i_s_pk.toFixed(2)} \\cdot ${t_on_delay_sr.toFixed(2)}n \\cdot ${f_sw_k.toFixed(2)}k = ${p_sr_dead.toFixed(3)} \\text{ W} \\end{aligned}`);
            renderFormula('f-sr-total', `\\begin{aligned} &\\small P_{SR\\_loss} = P_{SR\\_cond} + P_{dead} = ${p_sr_cond.toFixed(3)} + ${p_sr_dead.toFixed(3)} = ${p_sr.toFixed(3)} \\text{ W} \\end{aligned}`);

            // 5. VBUS / Others - p_vbus, p_emi, p_cout, p_other
            const p_vbus = Math.pow(i_out, 2) * r_ds_on_blocking;
            document.getElementById('fb-blocking').value = p_vbus.toFixed(3);
            renderFormula('f-blocking', `\\begin{aligned} &\\small P_{Blocking} = I_{out}^2 \\cdot R_{ds\\_on\\_Blk} = ${i_out.toFixed(2)}^2 \\cdot ${r_ds_on_blocking.toFixed(3)} = ${p_vbus.toFixed(3)} \\text{ W} \\end{aligned}`);

            // LF51 & Output Cap Loss
            
            const p_lf51_loss = Math.pow(is_rms, 2) * dcr_lf51;
            const i_outcap_rms = Math.sqrt(Math.max(0, Math.pow(is_rms, 2) - Math.pow(i_out, 2)));
            const p_outcap_loss = Math.pow(i_outcap_rms, 2) * esr_outcap;
            const p_lf51_cout_total = p_lf51_loss + p_outcap_loss;
            
            document.getElementById('fb-lf51-cout').value = p_lf51_cout_total.toFixed(3);
            renderFormula('f-lf51-cout', `
                \\begin{aligned}
                &\\small P_{LF51\\_loss} = I_{s\\_rms}^2 \\cdot DCR_{LF51} = ${is_rms.toFixed(2)}^2 \\cdot ${dcr_lf51.toFixed(3)} = ${p_lf51_loss.toFixed(3)} \\text{ W} \\\\
                &\\small I_{Outcap\\_rms} = \\sqrt{I_{s\\_rms}^2 - I_{out}^2} = \\sqrt{${is_rms.toFixed(2)}^2 - ${i_out.toFixed(2)}^2} = ${i_outcap_rms.toFixed(3)} \\text{ A} \\\\
                &\\small P_{Outcap\\_loss} = I_{Outcap\\_rms}^2 \\cdot ESR_{Outcap} = ${i_outcap_rms.toFixed(3)}^2 \\cdot ${esr_outcap.toFixed(3)} = ${p_outcap_loss.toFixed(3)} \\text{ W}
                \\end{aligned}
            `);

            const p_partial_loss = p_pwm + p_rcd + p_mag + p_sr + p_vbus + p_lf51_cout_total + p_other;
            const p_in_approx = p_out + p_partial_loss;

            // Final Sum and Display
            let totalLoss = 0;
            powerDesign.sections.forEach(sec => {
                let secSum = 0;
                sec.components.forEach(comp => {
                    const val = parseNum(comp.id, 0);
                    secSum += val;
                });
                const sumEl = document.getElementById('sum-' + sec.id);
                if (sumEl) sumEl.innerText = secSum.toFixed(3) + ' W';
                totalLoss += secSum;
            });

            const totalLossEl = document.getElementById('val-total-ploss');
            if (totalLossEl) totalLossEl.innerText = totalLoss.toFixed(3);
            
            const p_in = p_out + totalLoss;
            const p_in_el = document.getElementById('val-pin');
            if (p_in_el) p_in_el.innerText = p_in.toFixed(3);

            const efficiency = (p_out / p_in) * 100;
            const effEl = document.getElementById('val-efficiency');
            if (effEl) effEl.innerText = efficiency.toFixed(3);

            // Summary Panel KaTeX (使用 innerText 確保無輸入屬性)
            const pin_latex = `\\begin{aligned} &\\footnotesize P_{in}=P_{out}+P_{loss}=${p_out.toFixed(1)}+${totalLoss.toFixed(3)}=${p_in.toFixed(3)} \\text{ W} \\end{aligned}`;
            const eff_latex = `\\begin{aligned} &\\footnotesize \\eta=\\frac{P_{out}}{P_{in}} \\cdot 100=\\frac{${p_out.toFixed(1)}}{${p_in.toFixed(3)}} \\cdot 100=${efficiency.toFixed(3)} \\% \\end{aligned}`;
            
            const pinEl = document.getElementById('summary-pin-formula-box');
            if (pinEl) {
                pinEl.innerText = pin_latex;
                renderFormula('summary-pin-formula-box', pin_latex);
            }
            
            const effFormulaEl = document.getElementById('summary-eff-formula-box');
            if (effFormulaEl) {
                effFormulaEl.innerText = eff_latex;
                renderFormula('summary-eff-formula-box', eff_latex);
            }

            updateChart();
            saveInputsToStorage();
        } catch (err) {
            console.error("calculatePower Error:", err);
        }
    }

        function getConfigData() {
            const data = {};
            const inputs = document.querySelectorAll('input[type="number"], input[type="checkbox"], select');
            inputs.forEach(input => {
                if (input.id && input.id !== 'import-file') {
                    if (input.type === 'checkbox') {
                        data[input.id] = input.checked;
                    } else {
                        data[input.id] = input.value;
                    }
                }
            });
            return data;
        }

        function applyConfigData(data) {
            if (!data) return;
            const inputs = document.querySelectorAll('input[type="number"], input[type="checkbox"], select');
            inputs.forEach(input => {
                if (input.id && data.hasOwnProperty(input.id)) {
                    if (input.type === 'checkbox') {
                        input.checked = data[input.id];
                    } else {
                        input.value = data[input.id];
                    }
                }
            });
            if (typeof toggleLF2 === 'function') toggleLF2();
            calculatePower();
        }

        function exportJSON() {
            const data = getConfigData();
            const jsonStr = JSON.stringify(data, null, 2);
            const blob = new Blob([jsonStr], { type: "application/json" });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            
            const date = new Date();
            const dateStr = date.getFullYear().toString() + 
                            (date.getMonth() + 1).toString().padStart(2, '0') + 
                            date.getDate().toString().padStart(2, '0');
                            
            a.href = url;
            a.download = `Flyback_Config_${dateStr}.json`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }

        function importJSON(event) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const data = JSON.parse(e.target.result);
                    applyConfigData(data);
                } catch (err) {
                    alert("JSON parsing error: " + err.message);
                }
            };
            reader.readAsText(file);
            event.target.value = '';
        }

        function clearLocalData() {
            if (confirm("確定要清除所有暫存的專案參數嗎？(Yes to clear)")) {
                localStorage.removeItem('flyback_auto_save');
                alert("暫存已清除。");
            }
        }

        function saveInputsToStorage() {
            try {
                const data = getConfigData();
                localStorage.setItem('flyback_auto_save', JSON.stringify(data));
            } catch (e) {
                console.warn("Local storage not accessible");
            }
        }

        function loadInputsFromStorage() {
            let loaded = false;
            try {
                const savedValue = localStorage.getItem('flyback_auto_save');
                if (savedValue) {
                    applyConfigData(JSON.parse(savedValue));
                    loaded = true;
                }
            } catch (e) {
                console.warn("Local storage parse error:", e);
            }
            if (!loaded) {
                if (typeof toggleLF2 === 'function') toggleLF2();
                calculatePower();
            }
        }

        function updateChart() {
            const labels = [];
            const data = [];
            const colors = ['#3b82f6', '#10b981', '#f59e0b', '#ef4444', '#8b5cf6', '#06b6d4', '#ec4899', '#71717a', '#facc15', '#6b7280'];
            
            powerDesign.sections.forEach(sec => {
                sec.components.forEach(comp => {
                    labels.push(comp.label);
                    data.push(parseNum(comp.id, 0));
                });
            });

            const canvas = document.getElementById('lossChart');
            if (!canvas) return;
            const ctx = canvas.getContext('2d');
            
            if (lossChartInstance) {
                lossChartInstance.data.labels = labels;
                lossChartInstance.data.datasets[0].data = data;
                lossChartInstance.update();
            } else {
                lossChartInstance = new Chart(ctx, {
                    type: 'doughnut',
                    data: {
                        labels: labels,
                        datasets: [{
                            data: data,
                            backgroundColor: colors,
                            borderColor: '#1a1a1a',
                            borderWidth: 3,
                            hoverOffset: 15
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: {
                            legend: { 
                                position: 'bottom', 
                                labels: { 
                                    color: '#a3a3a3', 
                                    font: { size: 10 },
                                    usePointStyle: true,
                                    padding: 15
                                } 
                            },
                            tooltip: {
                                callbacks: {
                                    label: function(context) {
                                        const value = context.raw || 0;
                                        const total = context.dataset.data.reduce((a, b) => a + b, 0);
                                        const percentage = total > 0 ? ((value / total) * 100).toFixed(1) : 0;
                                        return `損耗: ${value.toFixed(3)} W (${percentage}%)`;
                                    }
                                }
                            }
                        },
                        layout: {
                            padding: {
                                top: 0,
                                bottom: 30,
                                left: 10,
                                right: 10
                            }
                        },
                        cutout: '70%'
                    }
                });
            }
        }

        function changeZoom(step) {
            if (step === 0) document.body.style.zoom = 1;
            else document.body.style.zoom = (parseFloat(document.body.style.zoom) || 1) + step;
        }

        window.onload = () => {
            renderUI();
            loadInputsFromStorage();
            // Trigger a resize to ensure Chart.js handles parent container correctly
            window.dispatchEvent(new Event('resize'));
        };
    </script>
</body>

</html>
